<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Der Chancen-Finder</title>
<style>
:root{
  --bg:#f4f5f8; --card:#ffffff; --ink:#11131a; --muted:#6b7280; --faint:#9aa0ab; --line:#ebedf2;
  --primary:#4f46e5; --primary-d:#4338ca; --primary-bg:#ecedfd;
  --green:#16a34a; --green-bg:#e6f6ec; --amber:#d97706; --amber-bg:#fbf0db;
  --red:#e05640; --red-bg:#fcebe7; --blue:#2563eb; --blue-bg:#e7eefc;
  --dark:#10131f; --dark2:#191e30; --dark-line:#272d44;
  --shadow:0 1px 2px rgba(17,19,26,.04),0 4px 16px rgba(17,19,26,.05);
  --shadow-h:0 8px 30px rgba(17,19,26,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.45;overflow-x:hidden}
button{font-family:inherit}
a{color:inherit}
/* ===== Shell ===== */
.shell{display:flex;min-height:100vh}
.side{width:240px;flex:none;border-right:1px solid var(--line);background:var(--card);
  position:sticky;top:0;height:100vh;padding:20px 14px;display:flex;flex-direction:column;gap:6px}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
.brand .logo{width:36px;height:36px;border-radius:11px;background:var(--primary-bg);display:flex;align-items:center;justify-content:center;font-size:18px}
.brand b{font-size:14px;font-weight:800;letter-spacing:-.2px;line-height:1.1}
.brand small{display:block;color:var(--faint);font-weight:700}
.navi{display:flex;flex-direction:column;gap:3px}
.navi a{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:12px;color:var(--muted);
  font-weight:650;font-size:14.5px;cursor:pointer;text-decoration:none}
.navi a .ic{font-size:18px;width:22px;text-align:center}
.navi a.on{background:var(--primary-bg);color:var(--primary-d)}
.navi a:hover:not(.on){background:#f5f5f8}
.streak{margin-top:auto;border:1px solid var(--line);border-radius:16px;padding:14px;background:linear-gradient(180deg,#fffaf0,#fff)}
.streak .t{font-weight:800;font-size:14px}.streak .s{color:var(--muted);font-size:12px;margin-bottom:8px}
.streak .dots{display:flex;align-items:center;gap:6px}
.streak .dots i{height:4px;border-radius:9px;background:var(--line);flex:1}
.streak .dots i.on{background:var(--gold,#e8b54d)}
.streak .dots b{width:11px;height:11px;border-radius:50%;background:var(--primary);flex:none;box-shadow:0 0 0 3px var(--primary-bg)}
.main{flex:1;min-width:0;padding:26px 30px 40px;max-width:1080px}
/* ===== Headings ===== */
.hi{font-size:30px;font-weight:850;letter-spacing:-.8px;margin:2px 0 4px}
.hi-sub{color:var(--muted);font-size:15px;margin:0 0 22px}
.sec{font-size:18px;font-weight:800;letter-spacing:-.3px;margin:26px 0 12px}
/* ===== KPI ===== */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);display:flex;gap:14px;align-items:center}
.kpi .ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex:none}
.kpi .n{font-size:26px;font-weight:850;letter-spacing:-.5px;line-height:1}
.kpi .l{font-weight:750;font-size:13.5px;margin-top:3px}
.kpi .s{color:var(--faint);font-size:12px}
/* ===== Cards ===== */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
.hero{padding:22px;display:grid;grid-template-columns:74px 1fr 190px;gap:18px;align-items:start;position:relative}
.hero .appic{width:74px;height:74px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;background:var(--green-bg)}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.b{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:750;border-radius:999px;padding:3px 9px;background:#f1f2f5;color:var(--muted)}
.b.fit{background:var(--green-bg);color:var(--green)} .b.money{background:var(--green-bg);color:var(--green)}
.b.pain{background:var(--red-bg);color:var(--red)} .b.sol{background:var(--blue-bg);color:var(--blue)} .b.adv{background:var(--amber-bg);color:var(--amber)}
.hero h3{margin:0 0 10px;font-size:20px;font-weight:800;letter-spacing:-.4px;line-height:1.25}
.quote{background:#faf9f7;border-left:3px solid #e8b54d;border-radius:0 10px 10px 0;padding:11px 13px;font-size:14px;color:#3a3a44;font-style:italic}
.quote .src{display:block;font-style:normal;color:var(--faint);font-size:12px;margin-top:6px}
.hero .right{display:flex;flex-direction:column;gap:14px}
.metric .ml{font-size:11px;font-weight:750;color:var(--faint);text-transform:uppercase;letter-spacing:.4px}
.pot{font-weight:850;font-size:17px;display:flex;align-items:center;gap:6px}
.pot.hoch{color:var(--green)} .pot.mittel{color:var(--amber)} .pot.niedrig{color:var(--faint)}
.fitn{font-weight:850;font-size:17px;color:var(--green)}
.bar{height:7px;border-radius:9px;background:var(--line);overflow:hidden;margin-top:5px}
.bar>i{display:block;height:100%;background:var(--green)}
.bar.idle>i{background:linear-gradient(90deg,#e8b54d,#d99a1c)}
.ansehen{position:absolute;right:22px;bottom:22px;background:var(--primary);color:#fff;border:none;border-radius:11px;padding:10px 16px;font-weight:750;font-size:14px;cursor:pointer}
/* ===== Projects ===== */
.projects{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.proj{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;gap:11px;align-items:center;cursor:pointer;box-shadow:var(--shadow)}
.proj:hover{box-shadow:var(--shadow-h)}
.proj .pic{width:34px;height:34px;border-radius:10px;background:var(--primary-bg);display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}
.proj .pn{font-weight:750;font-size:13.5px;line-height:1.2}.proj .pc{color:var(--faint);font-size:12px}
.proj.add{border-style:dashed;color:var(--primary-d)} .proj.add .pic{background:var(--primary-bg)}
/* ===== Chances grid ===== */
.filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 14px;font-size:13.5px;font-weight:700;cursor:pointer;color:var(--muted)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.filters .right{margin-left:auto}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.cc{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;display:flex;flex-direction:column}
.cc:hover{transform:translateY(-3px);box-shadow:var(--shadow-h)}
.cc .bm{position:absolute;right:14px;top:14px;border:none;background:none;font-size:17px;color:var(--faint);cursor:pointer}
.cc .bm.on{color:var(--primary)}
.cc h4{margin:10px 0 8px;font-size:17px;font-weight:800;letter-spacing:-.3px;line-height:1.28;padding-right:22px}
.cc .q{font-size:13.5px;color:#44454f;font-style:italic;line-height:1.4}
.cc .qs{color:var(--faint);font-size:12px;font-style:normal;margin-top:4px}
.hr{height:1px;background:var(--line);margin:14px 0}
.twocol{display:flex;gap:18px}
.twocol>div{flex:1;min-width:0}
.cap{font-size:11px;font-weight:750;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.step{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.step .sl{font-weight:800;font-size:14.5px}
.go{width:38px;height:38px;border-radius:50%;background:var(--primary);color:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex:none}
.mt-auto{margin-top:auto}
/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:13px;border:1px solid var(--line);
  background:var(--card);color:var(--ink);font-weight:750;font-size:15px;padding:13px 16px;cursor:pointer;width:100%}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn.dark{background:var(--ink);color:#fff;border-color:var(--ink)}
/* ===== Detail / Copilot ===== */
.det{display:flex;gap:22px;align-items:flex-start}
.det .left{flex:1.3;min-width:0}.det .copilot{flex:1;min-width:0}
.cop-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
.cop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.cop-b{border:1px solid var(--line);background:var(--card);border-radius:13px;padding:13px;text-align:left;cursor:pointer;display:flex;gap:9px;align-items:flex-start;font-weight:700;font-size:13px;line-height:1.25}
.cop-b:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.cop-b .ci{font-size:16px}
.cop-b.on{border-color:var(--primary);background:var(--primary-bg)}
.chatrow{display:flex;gap:8px;margin-top:12px}
.chatrow input{flex:1;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;background:var(--card)}
.chatrow button{border:none;background:var(--primary);color:#fff;border-radius:12px;width:46px;font-size:17px;cursor:pointer}
.cop-out{white-space:pre-wrap;font-size:14.5px;line-height:1.55;background:#fbfbfd;border:1px solid var(--line);border-radius:13px;padding:14px;margin-top:12px}
.detbadges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.qpair{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.link{display:inline-block;background:var(--primary-bg);color:var(--primary-d);border-radius:10px;padding:9px 12px;font-weight:750;font-size:13px;margin-top:10px;cursor:pointer}
.stepbox{border:1px solid var(--line);border-radius:13px;padding:14px;display:flex;align-items:center;justify-content:space-between;margin-top:14px}
/* ===== Sofort testen (dark) ===== */
.dark-wrap{background:var(--dark);border-radius:20px;padding:22px;color:#fff}
.dark-wrap h2{margin:0 0 4px;font-size:20px;font-weight:850;letter-spacing:-.4px}
.dark-wrap .ds{color:#aeb4c7;font-size:13.5px;margin-bottom:16px}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dc{background:var(--dark2);border:1px solid var(--dark-line);border-radius:15px;padding:16px}
.dc h4{margin:8px 0 12px;font-size:15px;font-weight:800;line-height:1.3}
.dc .cap{color:#7f87a0}
.dc .pot.hoch{color:#4ade80}.dc .pot.mittel{color:#fbbf24}
.dc .fitn{color:#fff}
.dc .bar{background:#2b3250}.dc .bar>i{background:#4ade80}
.dc .jetzt{margin-top:14px;background:#fff;color:var(--ink);border:none;border-radius:11px;padding:11px;width:100%;font-weight:800;cursor:pointer}
.db{background:#222842;color:#cfd4e6}.db.fit{background:#15321f;color:#4ade80}.db.money{background:#15321f;color:#4ade80}.db.pain{background:#3a2020;color:#f59a86}.db.sol{background:#1b2c4d;color:#86b3f5}.db.adv{background:#3a2f17;color:#f5c542}
/* ===== Onboarding ===== */
.ob{max-width:460px;margin:0 auto;padding:30px 20px 40px;min-height:100vh;display:flex;flex-direction:column}
.prog{display:flex;align-items:center;gap:8px;margin-bottom:26px}
.prog .num{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px}
.prog .num.g{background:var(--green)} .prog .num.o{background:var(--amber)}
.prog .ln{height:6px;border-radius:9px;background:var(--line);flex:1}
.prog .ln.on{background:#dfe1ea}
.obh{font-size:23px;font-weight:850;letter-spacing:-.5px;margin:0 0 4px}
.obs{color:var(--muted);font-size:14px;margin:0 0 18px}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qc{border:1px solid var(--line);background:var(--card);border-radius:14px;padding:14px;font-weight:700;font-size:14.5px;cursor:pointer;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow)}
.qc .qi{font-size:16px}
.qc.on{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary) inset}
.obinput{width:100%;border:1px solid var(--line);border-radius:13px;padding:14px;font-size:16px;background:var(--card);margin-top:10px}
.checks{display:flex;flex-direction:column;gap:10px}
.check{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:var(--card);border-radius:13px;padding:14px;cursor:pointer;box-shadow:var(--shadow)}
.check .box{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.check.on .box{background:var(--primary);border-color:var(--primary)}
.check.on.o .box{background:var(--amber);border-color:var(--amber)}
.starline{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.starline .lab{font-weight:700;font-size:14px}
.star{font-size:26px;color:var(--line);background:none;border:none;cursor:pointer;padding:1px 2px}.star.on{color:#f5b301}
.obfoot{margin-top:auto;padding-top:22px}
.obbtn{width:100%;border:none;border-radius:13px;padding:15px;font-weight:800;font-size:16px;color:#fff;background:var(--primary);cursor:pointer}
.obbtn.g{background:var(--green)} .obbtn.o{background:var(--amber)}
.obback{display:block;width:100%;text-align:center;background:none;border:none;color:var(--muted);font-weight:700;padding:12px;margin-top:6px;cursor:pointer}
.obnote{text-align:center;color:var(--primary-d);font-weight:700;font-size:13px;margin-top:10px}
/* ===== Bottom nav (mobile) ===== */
.bnav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(255,255,255,.97);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);justify-content:space-around;
  padding:7px 6px calc(7px + env(safe-area-inset-bottom))}
.bnav a{flex:1;text-align:center;color:var(--faint);font-size:10.5px;font-weight:700;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;border:none;background:none}
.bnav a .ic{font-size:20px}.bnav a.on{color:var(--ink)}
.bnav a.mid .ic{background:var(--primary);color:#fff;width:46px;height:46px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-top:-18px;box-shadow:var(--shadow-h)}
.mtop{display:none}
/* ===== Sheet ===== */
.scrim{position:fixed;inset:0;background:rgba(17,19,30,.45);z-index:50;display:none}.scrim.on{display:block}
.sheet{position:fixed;z-index:60;background:var(--bg);overflow:auto;display:none}
.sheet.on{display:block}
.sheet .grab{display:none}
.x{position:absolute;right:16px;top:16px;border:1px solid var(--line);background:var(--card);width:36px;height:36px;border-radius:50%;font-size:17px;color:var(--muted);cursor:pointer;z-index:5}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#11131a;color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;z-index:80;opacity:0;transition:opacity .2s;max-width:90%}
.toast.on{opacity:1}
.spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--primary);border-radius:50%;animation:r 1s linear infinite;margin:30px auto}@keyframes r{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--muted);padding:50px 16px}.empty .big{font-size:42px}
/* Desktop sheet = centered panel */
@media(min-width:980px){
  .sheet{left:50%;top:50%;transform:translate(-50%,-50%);width:min(960px,92vw);max-height:90vh;border-radius:20px;padding:26px}
}
/* ===== Mobile ===== */
@media(max-width:979px){
  .side{display:none}
  .main{padding:14px 14px 92px;max-width:100%}
  .bnav{display:flex}
  .mtop{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px 4px}
  .mtop .brand{padding:0}
  .mtop .fp{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:6px 12px;font-size:13px;max-width:55%;overflow:hidden}
  .mtop .fp select{border:none;background:none;font:inherit;max-width:130px}
  .hi{font-size:24px}
  .kpis{grid-template-columns:1fr;gap:10px}
  .hero{grid-template-columns:1fr;gap:14px}
  .hero .appic{width:56px;height:56px;font-size:26px}
  .hero .right{flex-direction:row;flex-wrap:wrap;gap:18px}.hero .right .metric{flex:1}
  .ansehen{position:static;width:100%;margin-top:6px;padding:13px}
  .projects{grid-template-columns:1fr 1fr}
  .grid{grid-template-columns:1fr}
  .dgrid{grid-template-columns:1fr}
  .det{flex-direction:column}
  .sheet{left:0;right:0;bottom:0;top:auto;max-height:94vh;border-radius:20px 20px 0 0;padding:8px 14px 30px}
  .sheet .grab{display:block;width:42px;height:5px;border-radius:9px;background:var(--line);margin:8px auto 4px}
  .cop-grid{grid-template-columns:1fr}
  .qpair{grid-template-columns:1fr}
}

  /* Live-Aktivitäts-Feed beim Einrichten */
  .feed{display:flex;flex-direction:column;gap:1px;margin-top:8px;max-height:60vh;overflow:auto}
  .frow{display:flex;gap:12px;align-items:flex-start;padding:11px 4px;border-bottom:1px solid var(--line);animation:fadein .25s ease}
  .frow:last-child{border-bottom:none}
  .frow .ftext{flex:1;min-width:0}
  .fl{font-weight:700;font-size:14.5px;line-height:1.3}
  .frow.run .fl{color:var(--ink)} .frow.queued .fl{color:var(--faint)}
  .fd{color:var(--muted);font-size:12.5px;margin-top:2px;word-break:break-word}
  .fok{color:#fff;background:var(--green);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex:none;margin-top:1px}
  .fdot{width:22px;height:22px;border-radius:50%;background:var(--line);flex:none}
  .fspin{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--line);border-top-color:var(--primary);animation:r .8s linear infinite;flex:none}
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="brand"><div class="logo">🎯</div><div><b>Der</b><small>Chancen-Finder</small></div></div>
    <div class="navi" id="navi">
      <a data-tab="home" class="on"><span class="ic">🏠</span>Heute</a>
      <a data-tab="chances"><span class="ic">💡</span>Chancen</a>
      <a data-tab="test"><span class="ic">🚀</span>Sofort testen</a>
      <a data-tab="tasks"><span class="ic">📋</span>Aufgaben</a>
      <a data-tab="profile"><span class="ic">👤</span>Profil</a>
    </div>
    <div class="streak"><div class="t">🔥 3 Tage in Folge</div><div class="s">Weiter so!</div>
      <div class="dots"><i class="on"></i><i class="on"></i><i class="on"></i><b></b><i></i><i></i><i></i></div></div>
  </aside>
  <main class="main">
    <div class="mtop">
      <div class="brand"><div class="logo">🎯</div><div><b style="font-size:15px">Chancen-Finder</b></div></div>
      <div class="fp" id="fpMobile" style="display:none">🔎 <select id="fieldSelM"></select></div>
    </div>
    <div id="view"><div class="empty"><div class="spin"></div><p>lädt…</p></div></div>
  </main>
</div>

<nav class="bnav" id="bnav" style="display:none">
  <a data-tab="home" class="on"><span class="ic">🏠</span>Heute</a>
  <a data-tab="chances"><span class="ic">💡</span>Chancen</a>
  <a data-tab="new" class="mid"><span class="ic">＋</span></a>
  <a data-tab="tasks"><span class="ic">📋</span>Aufgaben</a>
  <a data-tab="profile"><span class="ic">👤</span>Profil</a>
</nav>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"><div class="grab"></div><button class="x" id="sheetX">✕</button><div id="sheetBody"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./config.js"></script>
<script>
const cfg=window.PAINFINDER_CONFIG||{};
const sb=supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
const FN=(cfg.SUPABASE_URL||"")+"/functions/v1/";
let NICHES=[],NICHE=null,CHANCES=[],TAB="home",STATS={mentions:0,sources:0};
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("on");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("on"),2200);}
function getSecret(){let s=sessionStorage.getItem("pf_secret");if(!s){s=prompt("Zugangs-Code:");if(s)sessionStorage.setItem("pf_secret",s);}return s;}
async function callFn(name,body,withNiche=true){
  const secret=getSecret();if(!secret){toast("Kein Zugangs-Code");return null;}
  const p=Object.assign({},body||{});if(withNiche&&NICHE&&p.niche_id==null)p.niche_id=NICHE;
  try{const r=await fetch(FN+name,{method:"POST",headers:{"Authorization":"Bearer "+cfg.SUPABASE_ANON_KEY,"Content-Type":"application/json","x-painfinder-secret":secret},body:JSON.stringify(p)});
    let j=null;try{j=await r.json();}catch(_){}if(r.status===401){sessionStorage.removeItem("pf_secret");toast("Code falsch");return null;}
    return{ok:r.ok&&!(j&&j.error),j,status:r.status};}catch(e){return{ok:false,j:{error:String(e)}};}
}
/* derivations */
function potential(o){const s=o.opportunity_score||0;if(s>=70)return{k:"hoch",t:"Hoch"};if(s>=40)return{k:"mittel",t:"Mittel"};return{k:"niedrig",t:"Niedrig"};}
function fitPct(o){return Math.round((o.founder_fit||0)*10);}
function fitLabel(o){const f=o.founder_fit||0;return f>=7?"Hoher Fit":f>=4?"Mittlerer Fit":"Geringer Fit";}
function nextStep(o){const st=o.stage||1,f=o.founder_fit||0;
  if(st>=4&&f>=6)return{k:"sell",t:"Direkt verkaufen"};if(st>=4)return{k:"mvp",t:"MVP bauen"};
  if(st===3)return{k:"landing",t:"Landingpage bauen"};if(st===2)return{k:"interview",t:"Interview führen"};return{k:"watch",t:"Im Blick behalten"};}
function badgesOf(o,dark){const d=dark?"db ":"b ";let h="";
  h+='<span class="'+d+'fit">'+fitLabel(o)+'</span>';
  if(o.sig_money)h+='<span class="'+d+'money">💰 Geld</span>';
  if(o.sig_pain)h+='<span class="'+d+'pain">😣 Frust</span>';
  if(o.sig_solution)h+='<span class="'+d+'sol">🔍 Alternative</span>';
  if(o.sig_advice)h+='<span class="'+d+'adv">❓ Frage</span>';return h;}
function topQuote(o){return o._q||o.monetization_idea||"";}
function catIcon(o){const c=(o.category||"").toLowerCase();if(c.includes("saas"))return"💻";if(c.includes("market"))return"🛒";if(c.includes("finanz"))return"💶";return"💡";}
/* saved (bookmark) */
function savedGet(){try{return JSON.parse(localStorage.getItem("cf_saved")||"[]");}catch(_){return[];}}
function toggleSave(id,el){let a=savedGet();if(a.includes(id)){a=a.filter(x=>x!==id);}else a.push(id);localStorage.setItem("cf_saved",JSON.stringify(a));if(el){el.classList.toggle("on");el.textContent=a.includes(id)?"🔖":"🔖";}event&&event.stopPropagation();}
/* data */
let LOADED=false,NICHES_ERR=false;
function setNicheSel(){const opt=NICHES.map(n=>'<option value="'+n.id+'"'+(n.id===NICHE?" selected":"")+'>'+esc(n.name)+'</option>').join("");const sm=$("fieldSelM");if(sm){sm.innerHTML=opt;sm.onchange=()=>switchField(sm.value);}}
async function ensureData(force){
  if(LOADED&&!force)return;
  NICHES_ERR=false;
  try{const{data,error}=await sb.from("niches").select("*").eq("is_archived",false).order("created_at");if(error)NICHES_ERR=true;NICHES=data||[];}catch(_){NICHES_ERR=true;NICHES=[];}
  if(NICHES.length){
    if(!NICHE||!NICHES.some(n=>n.id===NICHE)){const s=localStorage.getItem("cf_niche");NICHE=(s&&NICHES.some(n=>n.id===s))?s:NICHES[0].id;}
    await Promise.all(NICHES.map(async n=>{try{const{count}=await sb.from("dashboard_opportunities").select("*",{count:"exact",head:true}).eq("niche_id",n.id);n._count=count||0;}catch(_){n._count=0;}}));
    setNicheSel();await loadChances();
  }
  LOADED=true;
}
async function loadNiches(){LOADED=false;await ensureData();route();}
function route(){
  if(NICHES_ERR){$("bnav").style.display="none";$("view").innerHTML='<div class="empty"><div class="big">⚠️</div><p>Konnte gerade nicht laden.</p><button class="btn primary" style="max-width:240px;margin:14px auto" onclick="loadNiches()">Erneut versuchen</button></div>';return;}
  if(!NICHES.length){$("bnav").style.display="none";return startOnboarding();}
  $("bnav").style.display="flex";$("fpMobile").style.display="";go("home");
}
async function enterDashboard(nid,name){
  LOADED=false;
  try{const{data}=await sb.from("niches").select("*").eq("is_archived",false).order("created_at");NICHES=data||[];}catch(_){NICHES=NICHES||[];}
  if(!NICHES.some(n=>n.id===nid))NICHES.unshift({id:nid,name:name||"Neues Suchfeld"});
  NICHE=nid;localStorage.setItem("cf_niche",nid);
  await Promise.all(NICHES.map(async n=>{try{const{count}=await sb.from("dashboard_opportunities").select("*",{count:"exact",head:true}).eq("niche_id",n.id);n._count=count||0;}catch(_){n._count=0;}}));
  setNicheSel();await loadChances();LOADED=true;
  $("bnav").style.display="flex";$("fpMobile").style.display="";go(CHANCES.length?"chances":"home");
}
async function loadChances(){
  try{let q=sb.from("dashboard_opportunities").select("*");if(NICHE)q=q.eq("niche_id",NICHE);
    const{data}=await q;CHANCES=(data||[]).sort((a,b)=>(b.opportunity_score||0)-(a.opportunity_score||0));}catch(_){CHANCES=[];}
  // Top-Zitate für sichtbare Chancen nachladen (eine Abfrage)
  try{const ids=CHANCES.slice(0,12).map(o=>o.id);if(ids.length){const{data}=await sb.from("validation_evidence").select("opportunity_id,quote").in("opportunity_id",ids);
    (data||[]).forEach(e=>{const o=CHANCES.find(x=>x.id===e.opportunity_id);if(o&&!o._q&&e.quote)o._q=e.quote;});}}catch(_){}
  // stats
  try{const m=await sb.from("raw_mentions").select("*",{count:"exact",head:true}).eq("niche_id",NICHE);STATS.mentions=m.count||0;}catch(_){STATS.mentions=0;}
  try{const s=await sb.from("problem_sources").select("*",{count:"exact",head:true}).eq("niche_id",NICHE);STATS.sources=s.count||0;}catch(_){STATS.sources=0;}
}
function switchField(id){NICHE=id;localStorage.setItem("cf_niche",id);const sm=$("fieldSelM");if(sm)sm.value=id;loadChances().then(()=>go(TAB));}
/* nav */
function wireNav(){document.querySelectorAll("#navi a,#bnav a").forEach(a=>a.onclick=()=>go(a.dataset.tab));}
async function go(tab){
  if(tab==="new")return startOnboarding();
  await ensureData();
  if(NICHES_ERR){route();return;}
  if(!NICHES.length){return startOnboarding();}
  $("bnav").style.display="flex";$("fpMobile").style.display="";
  TAB=tab;
  document.querySelectorAll("#navi a,#bnav a").forEach(a=>a.classList.toggle("on",a.dataset.tab===tab));
  ({home:renderHome,chances:renderChances,test:renderTest,tasks:renderTasks,profile:renderProfile}[tab]||renderHome)();window.scrollTo(0,0);}
/* HOME */
function renderHome(){
  const total=CHANCES.length;
  const avgFit=total?Math.round(CHANCES.reduce((s,o)=>s+fitPct(o),0)/total):0;
  const top=CHANCES[0];
  let h='<div class="hi">Hallo Fabrizio! 👋</div><p class="hi-sub">Wir hören an '+STATS.sources+' Orten zu und haben '+total+' Chancen für dich gefunden.</p>';
  h+='<div class="kpis">'+
    kpi("📡","var(--primary-bg)",total,"Neue Chancen","gefunden")+
    kpi("💬","var(--green-bg)",STATS.mentions,"Kundenstimmen","gesammelt")+
    kpi("🎯","var(--amber-bg)",avgFit+"%","Passt zu dir","Ø dieser Chancen")+'</div>';
  if(top){h+='<div class="sec">Top-Chance für dich</div>'+heroCard(top);}
  h+='<div class="sec">Deine Suchfelder</div><div class="projects">'+
    NICHES.map(n=>'<div class="proj" onclick="switchField(\''+n.id+'\')"><div class="pic">'+(n.id===NICHE?"📂":"🗂")+'</div><div><div class="pn">'+esc(n.name)+'</div><div class="pc">'+(n._count||0)+' Chancen</div></div></div>').join("")+
    '<div class="proj add" onclick="go(\'new\')"><div class="pic">＋</div><div><div class="pn">Neues Suchfeld</div><div class="pc">entdecken</div></div></div></div>';
  $("view").innerHTML=h;
}
function kpi(ic,bg,n,l,s){return '<div class="kpi"><div class="ic" style="background:'+bg+'">'+ic+'</div><div><div class="n">'+n+'</div><div class="l">'+l+'</div><div class="s">'+s+'</div></div></div>';}
function heroCard(o){const p=potential(o);
  return '<div class="card hero" onclick="openChance(\''+o.id+'\')">'+
    '<div class="appic">'+catIcon(o)+'</div>'+
    '<div><div class="badges">'+badgesOf(o)+'</div><h3>'+esc(o.title)+'</h3>'+
      (topQuote(o)?'<div class="quote">„'+esc(String(topQuote(o)).slice(0,150))+'"<span class="src">– echte Kundenstimme</span></div>':'')+'</div>'+
    '<div class="right">'+
      '<div class="metric"><div class="ml">Geschäftspotenzial</div><div class="pot '+p.k+'">'+p.t+' <span style="font-size:13px">📊</span></div></div>'+
      '<div class="metric"><div class="ml">Passt zu dir</div><div class="fitn">'+fitPct(o)+'%</div><div class="bar"><i style="width:'+fitPct(o)+'%"></i></div></div>'+
    '</div>'+
    '<button class="ansehen" onclick="event.stopPropagation();openChance(\''+o.id+'\')">Ansehen →</button></div>';
}
/* CHANCES */
let FILTER=new Set();
function renderChances(){
  let h='<div class="hi" style="font-size:24px">Deine Chancen</div>';
  h+='<div class="filters">'+
    '<button class="chip'+(!FILTER.size?" on":"")+'" onclick="FILTER.clear();renderChances()">Alle</button>'+
    [["money","💰 Geld"],["pain","😣 Frust"],["solution","🔍 Alternative"],["advice","❓ Frage"]].map(([k,l])=>'<button class="chip'+(FILTER.has(k)?" on":"")+'" onclick="toggleFilter(\''+k+'\')">'+l+'</button>').join("")+
    '<button class="chip right">⚙ Filter</button></div>';
  const list=CHANCES.filter(o=>!FILTER.size||[...FILTER].some(k=>o["sig_"+k]));
  let emptyHtml;
  if(!CHANCES.length){emptyHtml='<div class="empty"><div class="big">🌱</div><p>Noch keine Chancen in diesem Suchfeld.<br>Die Quellen liefern evtl. wenig — füge mehr Orte hinzu oder suche erneut.</p>'+
    '<div style="display:flex;gap:10px;max-width:380px;margin:16px auto"><button class="btn" onclick="go(\'profile\')">Mehr Orte</button><button class="btn primary" onclick="reprocess()">Erneut suchen</button></div></div>';}
  else emptyHtml='<div class="empty"><div class="big">🔍</div><p>Keine Chancen für diesen Filter.</p></div>';
  h+='<div class="grid">'+(list.length?list.map(chanceCard).join(""):emptyHtml)+'</div>';
  $("view").innerHTML=h;
}
function toggleFilter(k){FILTER.has(k)?FILTER.delete(k):FILTER.add(k);renderChances();}
function chanceCard(o){const p=potential(o),ns=nextStep(o),sv=savedGet().includes(o.id);
  return '<div class="cc" onclick="openChance(\''+o.id+'\')">'+
    '<button class="bm'+(sv?" on":"")+'" onclick="toggleSave(\''+o.id+'\',this)">🔖</button>'+
    '<div class="badges">'+badgesOf(o)+'</div>'+
    '<h4>'+esc(o.title)+'</h4>'+
    (topQuote(o)?'<div class="q">„'+esc(String(topQuote(o)).slice(0,120))+'"<span class="qs">– echte Kundenstimme</span></div>':'')+
    '<div class="hr"></div>'+
    '<div class="twocol"><div><div class="cap">Potenzial</div><div class="pot '+p.k+'">'+p.t+'</div></div>'+
      '<div><div class="cap">Passt zu dir</div><div class="fitn" style="font-size:14px">'+fitPct(o)+'%</div><div class="bar"><i style="width:'+fitPct(o)+'%"></i></div></div></div>'+
    '<div class="step mt-auto"><div><div class="cap">Nächster Schritt</div><div class="sl">'+ns.t+'</div></div>'+
      '<button class="go" onclick="event.stopPropagation();chooseStep(\''+o.id+'\')">→</button></div></div>';
}
/* SOFORT TESTEN */
function renderTest(){
  const list=CHANCES.filter(o=>(o.opportunity_score||0)>=70&&(o.founder_fit||0)>=6&&(o.evidence_count||0)>0);
  let h='<div class="dark-wrap"><h2>🚀 Sofort testen <span style="color:#7f87a0;font-weight:600;font-size:15px">– Chancen mit höchstem Potenzial</span></h2>'+
    '<div class="ds">Hohes Potenzial, passt zu dir, gut belegt — was du quasi morgen verkaufen kannst.</div>';
  h+= list.length? '<div class="dgrid">'+list.map(o=>{const p=potential(o);
    return '<div class="dc"><div class="badges">'+badgesOf(o,true)+'</div><h4>'+esc(o.title)+'</h4>'+
      '<div class="twocol"><div><div class="cap">Potenzial</div><div class="pot '+p.k+'">'+p.t+'</div></div>'+
      '<div><div class="cap">Fit</div><div class="fitn">'+fitPct(o)+'%</div><div class="bar"><i style="width:'+fitPct(o)+'%"></i></div></div></div>'+
      '<button class="jetzt" onclick="openChance(\''+o.id+'\')">Jetzt testen</button></div>';}).join("")+'</div>'
    : '<div class="empty" style="color:#aeb4c7"><div class="big">🌱</div><p>Noch keine Volltreffer. Sammle mehr Kundenstimmen.</p></div>';
  h+='</div>';
  $("view").innerHTML=h;
}
/* DETAIL + COPILOT */
function openSheet(html){$("sheetBody").innerHTML=html;$("scrim").classList.add("on");$("sheet").classList.add("on");$("sheet").scrollTop=0;}
function closeSheet(){$("scrim").classList.remove("on");$("sheet").classList.remove("on");}
$("scrim").onclick=closeSheet;$("sheetX").onclick=closeSheet;
const COPILOT=[["mvp","🚀","MVP Konzept erstellen"],["business_model","💼","Geschäftsmodell entwickeln"],["pricing","💶","Pricing-Vorschläge"],["audience","🎯","Zielgruppe definieren"],["landingpage","📝","Landingpage schreiben"],["ads","📢","Werbeanzeigen erstellen"],["validation","✅","Validierungsplan erstellen"],["sales","📈","Vertriebsstrategie erstellen"]];
async function openChance(id){
  const o=CHANCES.find(x=>x.id===id);if(!o)return;const p=potential(o),ns=nextStep(o);
  openSheet('<div class="empty"><div class="spin"></div></div>');
  let ev=[],j=[],ms=[];
  try{const r=await Promise.all([
    sb.from("validation_evidence").select("*").eq("opportunity_id",id),
    sb.from("jobs_to_be_done").select("*").eq("opportunity_id",id).limit(1),
    sb.from("opportunity_mentions").select("raw_mentions(platform,source_label)").eq("opportunity_id",id)]);
    ev=r[0].data||[];j=r[1].data||[];ms=r[2].data||[];}catch(_){}
  const job=j[0]||{},quotes=ev.filter(e=>e.quote).slice(0,3),money=ev.filter(e=>e.amount||e.evidence_type==="spending_disclosed");
  const srcNames=[...new Set((ms||[]).map(m=>m.raw_mentions&&(m.raw_mentions.source_label||m.raw_mentions.platform)).filter(Boolean))].slice(0,5);
  let left='<div class="detbadges">'+badgesOf(o)+'</div><h2 style="font-size:22px;font-weight:850;letter-spacing:-.5px;margin:0 0 14px">'+esc(o.title)+'</h2>';
  if(quotes.length){left+='<div class="cap" style="font-size:13px;margin-bottom:8px">💬 Kunden sagen</div><div class="qpair">'+quotes.slice(0,2).map(q=>'<div class="quote" style="margin:0">„'+esc(q.quote)+'"</div>').join("")+'</div>';
    if(o.mention_count>2)left+='<span class="link">Alle '+o.mention_count+' Kundenstimmen ansehen</span>';}
  if(money.length){left+='<div class="cap" style="font-size:13px;margin:16px 0 6px">💰 Warum das Geld wert ist</div><p style="margin:0;color:#3a3a44">'+esc(money[0].quote||"Nutzer zahlen bereits oder würden für eine bessere Lösung zahlen.")+(money[0].amount?' <b>('+esc(money[0].amount)+')</b>':'')+'</p>';}
  left+='<div class="cap" style="font-size:13px;margin:16px 0 6px">🎯 Passt zu dir — '+fitPct(o)+'%</div><div class="bar" style="max-width:240px"><i style="width:'+fitPct(o)+'%"></i></div>';
  if(srcNames.length)left+='<div class="cap" style="font-size:13px;margin:16px 0 4px">🎧 Gehört bei</div><p style="margin:0;color:var(--muted)">'+srcNames.map(esc).join(" · ")+'</p>';
  left+='<div class="stepbox"><div><div class="cap">Dein nächster Schritt</div><div class="sl" style="font-weight:800">'+ns.t+'</div></div><button class="go" onclick="chooseStep(\''+o.id+'\')">→</button></div>';
  let right='<div class="cop-card"><div style="font-weight:850;font-size:17px;letter-spacing:-.3px">Mit KI weiterentwickeln ✨</div>'+
    '<div style="color:var(--muted);font-size:13px;margin-top:2px">Wähle, womit wir dir helfen sollen.</div>'+
    '<div class="cop-grid">'+COPILOT.map(([k,ic,l])=>'<button class="cop-b" onclick="runCopilot(\''+id+'\',\''+k+'\',null,this)"><span class="ci">'+ic+'</span>'+l+'</button>').join("")+'</div>'+
    '<div class="chatrow"><input id="copQ" placeholder="Oder frage die KI etwas…"><button onclick="askCopilot(\''+id+'\')">➤</button></div>'+
    '<div id="copilotOut"></div></div>';
  openSheet('<div class="det"><div class="left">'+left+'</div><div class="copilot">'+right+'</div></div>');
}
async function runCopilot(id,task,question,btn){
  document.querySelectorAll("#sheetBody .cop-b").forEach(c=>c.classList.remove("on"));if(btn)btn.classList.add("on");
  $("copilotOut").innerHTML='<div class="empty" style="padding:20px"><div class="spin" style="margin:6px auto"></div><p>Claude denkt nach…</p></div>';
  const body=question?{opportunity_id:id,question:question}:{opportunity_id:id,task:task};
  const r=await callFn("chance-copilot",body,false);
  if(!r||!r.ok||!r.j||!r.j.text){$("copilotOut").innerHTML='<div class="cop-out">'+esc((r&&r.j&&(r.j.error||r.j.detail))||"Konnte nicht generieren. Funktion deployt?")+'</div>';return;}
  $("copilotOut").innerHTML='<div class="cop-out">'+esc(r.j.text)+'</div>';
}
function askCopilot(id){const q=$("copQ").value.trim();if(!q){toast("Frage eingeben");return;}runCopilot(id,null,q,null);$("copQ").value="";}
/* TASKS */
function tasksGet(){try{return JSON.parse(localStorage.getItem("cf_tasks")||"[]");}catch(_){return[];}}
function tasksSet(a){localStorage.setItem("cf_tasks",JSON.stringify(a));}
function chooseStep(id){const o=CHANCES.find(x=>x.id===id);if(!o)return;const ns=nextStep(o);const a=tasksGet();
  if(!a.some(t=>t.id===id&&t.step===ns.t))a.unshift({id:id,title:o.title,step:ns.t,done:false});tasksSet(a);
  toast("Als Aufgabe gespeichert ✓");closeSheet();go("tasks");}
function renderTasks(){const a=tasksGet(),done=a.filter(t=>t.done).length,pct=a.length?Math.round(done/a.length*100):0;
  let h='<div class="hi" style="font-size:24px">Aufgaben</div><p class="hi-sub">'+(a.length?done+' von '+a.length+' erledigt':'Wähle bei einer Chance „Nächster Schritt".')+'</p>';
  if(a.length){h+='<div class="bar" style="max-width:340px;margin-bottom:18px"><i style="width:'+pct+'%"></i></div>';
    h+=a.map((t,i)=>'<div class="cc" style="cursor:default;flex-direction:row;align-items:center;gap:12px;margin-bottom:12px">'+
      '<button class="bm" style="position:static;font-size:22px;color:'+(t.done?"var(--green)":"var(--faint)")+'" onclick="toggleTask('+i+')">'+(t.done?"☑":"☐")+'</button>'+
      '<div style="flex:1"><div style="font-weight:800'+(t.done?";text-decoration:line-through;color:var(--faint)":"")+'">'+esc(t.step)+'</div><div class="qs" style="position:static">'+esc(t.title)+'</div></div>'+
      '<button class="chip" onclick="openChance(\''+t.id+'\')">öffnen</button></div>').join("");
  }else h+='<div class="empty"><div class="big">📋</div><p>Noch keine Aufgaben.</p></div>';
  $("view").innerHTML=h;
}
function toggleTask(i){const a=tasksGet();if(a[i]){a[i].done=!a[i].done;tasksSet(a);renderTasks();}}
/* PROFILE */
let PROF={knowledge:[],reachable:"",can_build:""},PSTARS={knowledge:0,access:0,build:0};
function parseStars(cb){const m=String(cb||"").match(/Fachwissen\s*(\d)\/5,\s*Zugang\s*(\d)\/5,\s*Umsetzung\s*(\d)\/5/);return{knowledge:m?+m[1]:0,access:m?+m[2]:0,build:m?+m[3]:0};}
async function renderProfile(){
  if(!NICHE){$("view").innerHTML='<div class="hi" style="font-size:24px">Mein Profil</div><p class="hi-sub">Lege zuerst ein Suchfeld an.</p><button class="btn primary" style="max-width:260px" onclick="startOnboarding()">Suchfeld erstellen</button>';return;}
  $("view").innerHTML='<div class="hi" style="font-size:24px">Mein Profil</div><div class="spin"></div>';
  const r=await callFn("manage-niches",{action:"get",id:NICHE});PROF=(r&&r.j&&r.j.profile)||PROF;PSTARS=parseStars(PROF.can_build);
  const L=[["knowledge","Wissen"],["access","Zugang zu Kunden"],["build","Umsetzungskraft"]];
  let h='<div class="hi" style="font-size:24px">Mein Profil</div><p class="hi-sub">Das steuert, was „zu dir passt".</p>';
  h+='<div class="card" style="padding:18px;max-width:460px">'+L.map(([k,l])=>'<div class="starline"><span class="lab">'+l+'</span><span>'+[1,2,3,4,5].map(i=>'<button class="star'+(i<=PSTARS[k]?" on":"")+'" onclick="setStar(\''+k+'\','+i+')">★</button>').join("")+'</span></div>').join("")+'</div>';
  h+='<div class="sec">Suchfelder</div><div class="projects">'+NICHES.map(n=>'<div class="proj" onclick="switchField(\''+n.id+'\')"><div class="pic">🗂</div><div><div class="pn">'+esc(n.name)+'</div><div class="pc">'+(n._count||0)+' Chancen</div></div></div>').join("")+'<div class="proj add" onclick="go(\'new\')"><div class="pic">＋</div><div><div class="pn">Neues Suchfeld</div></div></div></div>';
  $("view").innerHTML=h;
}
function setStar(k,v){PSTARS[k]=v;const base=String(PROF.can_build||"").replace(/\s*·?\s*Selbsteinschätzung:.*$/,"").trim();
  PROF.can_build=(base?base+" · ":"")+"Selbsteinschätzung: Fachwissen "+PSTARS.knowledge+"/5, Zugang "+PSTARS.access+"/5, Umsetzung "+PSTARS.build+"/5";
  callFn("manage-niches",{action:"save",id:NICHE,knowledge:PROF.knowledge,reachable:PROF.reachable,can_build:PROF.can_build}).then(()=>toast("Gespeichert ✓"));renderProfile();}
/* ONBOARDING */
const TOPICS=[["Autohaus","🚗"],["Handwerk","🔧"],["Gastronomie","🍽"],["Immobilien","🏠"],["Energie","⚡"],["KI","🤖"],["Vereine","⚽"],["E-Commerce","🛒"]];
const AUDS=[["Kunden","👥"],["Mitarbeiter","🧑‍💼"],["Eltern","👨‍👩‍👧"],["Unternehmer","💼"],["Jugendliche","🧑"],["Vereine","⚽"],["Händler","🏪"]];
const PLACES=[["apps","App-Bewertungen"],["web","Webseiten & Blogs"],["communities","Communities"],["foren","Foren"],["reddit","Reddit"],["own","Eigene Texte"]];
let OB={step:1,topic:"",topicFree:"",aud:"",places:new Set(["apps","web","communities"]),stars:{knowledge:0,access:0,build:0}};
function startOnboarding(){OB={step:1,topic:"",topicFree:"",aud:"",places:new Set(["apps","web","communities"]),stars:{knowledge:0,access:0,build:0}};$("bnav").style.display=NICHES.length?"flex":"none";wireNav();renderOB();}
function prog(){let h='<div class="prog">';for(let i=1;i<=4;i++){const cls=OB.step===2?"g":OB.step===3?"o":"";
  if(i<OB.step)h+='<div class="num '+(i===2?"g":i===3?"o":"")+'">'+i+'</div>';
  else if(i===OB.step)h+='<div class="num '+(i===2?"g":i===3?"o":"")+'">'+i+'</div>';
  else h+='<div class="num" style="background:#e3e4ec;color:#a6abbb">'+i+'</div>';
  if(i<4)h+='<div class="ln'+(i<OB.step?" on":"")+'"></div>';}return h+'</div>';}
function renderOB(){let h='<div class="ob">'+prog();
  if(OB.step===1){h+='<div class="obh">Wobei möchtest du besser werden?</div><div class="obs">Wähle ein Thema oder schreibe dein eigenes.</div>'+
    '<div class="qgrid">'+TOPICS.map(([t,ic])=>'<div class="qc'+(OB.topic===t?" on":"")+'" onclick="obTopic(\''+t+'\')"><span class="qi">'+ic+'</span>'+t+'</div>').join("")+'</div>'+
    '<input class="obinput" id="obFree" placeholder="Eigenes Thema eingeben" value="'+esc(OB.topicFree)+'" oninput="OB.topicFree=this.value;OB.topic=\'\';document.querySelectorAll(\'.qc\').forEach(c=>c.classList.remove(\'on\'))">'+
    foot(OB.topic||OB.topicFree,"Weiter","");}
  else if(OB.step===2){h+='<div class="obh">Wen möchtest du verstehen?</div><div class="obs">Wähle deine Zielgruppe.</div>'+
    '<div class="checks">'+AUDS.map(([t,ic])=>'<div class="check'+(OB.aud===t?" on":"")+'" onclick="OB.aud=\''+t+'\';renderOB()"><span class="box">'+(OB.aud===t?"✓":"")+'</span><b>'+ic+' '+t+'</b></div>').join("")+'</div>'+
    foot(OB.aud,"Weiter","g");}
  else if(OB.step===3){h+='<div class="obh">Wo sollen wir zuhören?</div><div class="obs">Wir durchsuchen diese Orte nach echten Problemen.</div>'+
    '<div class="checks">'+PLACES.map(([k,l])=>'<div class="check o'+(OB.places.has(k)?" on":"")+'" onclick="obPlace(\''+k+'\')"><span class="box">'+(OB.places.has(k)?"✓":"")+'</span><b>'+l+'</b></div>').join("")+'</div>'+
    foot(OB.places.size,"Weiter","o");}
  else{const L=[["knowledge","Wissen"],["access","Zugang zu Kunden"],["build","Umsetzungskraft"]];
    h+='<div class="obh">Wie gut kennst du dich damit aus?</div><div class="obs">Bewerte dich selbst ehrlich.</div>'+
    '<div class="card" style="padding:8px 16px;box-shadow:none;border:none;background:none">'+L.map(([k,l])=>'<div style="margin-bottom:8px"><div class="lab" style="margin-bottom:2px">'+l+'</div><div>'+[1,2,3,4,5].map(i=>'<button class="star'+(i<=OB.stars[k]?" on":"")+'" onclick="OB.stars.'+k+'='+i+';renderOB()">★</button>').join("")+'</div></div>').join("")+'</div>'+
    foot(true,"Chancen finden 🚀","",true);}
  $("view").innerHTML=h+'</div>';
}
function foot(enabled,label,color,last){return '<div class="obfoot"><button class="obbtn '+color+'" '+(enabled?'onclick="'+(last?"obFinish()":"obNext()")+'"':'disabled style="opacity:.45"')+'>'+label+'</button>'+
  (OB.step>1?'<button class="obback" onclick="OB.step--;renderOB()">Zurück</button>':'')+
  (last?'<div class="obnote">Dauert nur 2–3 Minuten</div>':'')+'</div>';}
function obTopic(t){OB.topic=t;OB.topicFree="";renderOB();}
function obPlace(k){OB.places.has(k)?OB.places.delete(k):OB.places.add(k);renderOB();}
function obNext(){OB.step++;renderOB();}
let OBLOG=[],OBDONE=false,OBRESULT={nid:null,name:"",chances:0};
function feedRow(s){const ic=s.status==='run'?'<span class="fspin"></span>':s.status==='done'?'<span class="fok">✓</span>':'<span class="fdot"></span>';
  return '<div class="frow '+s.status+'">'+ic+'<div class="ftext"><div class="fl">'+esc(s.label)+'</div>'+(s.detail?'<div class="fd">'+esc(s.detail)+'</div>':'')+'</div></div>';}
function obFeed(){$("view").innerHTML='<div class="ob"><div class="obh">'+(OBDONE?'Fertig! 🎉':'Wir richten alles für dich ein…')+'</div>'+
  '<div class="obs">'+(OBDONE?(OBRESULT.chances+' Chancen gefunden.'):'Du kannst live mitlesen, was gerade passiert.')+'</div>'+
  '<div class="feed">'+OBLOG.map(feedRow).join("")+'</div>'+
  (OBDONE?'<div class="obfoot"><button class="obbtn" onclick="enterDashboard(OBRESULT.nid,OBRESULT.name)">'+(OBRESULT.chances?'Chancen ansehen →':'Weiter zum Dashboard →')+'</button></div>':'')+'</div>';
  const f=document.querySelector('.feed');if(f)f.scrollTop=f.scrollHeight;}
function obAdd(l){OBLOG.push({label:l,status:'run',detail:''});obFeed();return OBLOG.length-1;}
function obDone(i,d){if(OBLOG[i]){OBLOG[i].status='done';if(d)OBLOG[i].detail=d;}obFeed();}
function obSet(i,d){if(OBLOG[i])OBLOG[i].detail=d;obFeed();}
async function cnt(table,nid){try{const{count}=await sb.from(table).select("*",{count:"exact",head:true}).eq("niche_id",nid);return count||0;}catch(_){return 0;}}
const PLACE_LBL={"scrape-appstore":"App-Bewertungen","scrape-web":"Webseiten & Blogs","scrape-hn":"Communities","scrape-reddit":"Reddit","scrape-rss":"Aktuelle Beiträge"};
async function obFinish(){const topic=OB.topic||OB.topicFree;if(!topic)return;
  OBLOG=[];OBDONE=false;obFeed();
  let i=obAdd("Ich denke über dein Thema nach");
  const sug=await callFn("suggest-niche",{topic:topic,name:topic},false);
  const s=(sug&&sug.j&&sug.j.suggestion)||{name:topic,description:"",target_audience:OB.aud,keywords:[topic],competitors:[],sources:{terms:[topic],websites:[],rss:[],hackernews:[]}};
  obDone(i,"Verstanden: "+(s.name||topic)+((s.keywords&&s.keywords.length)?" · "+s.keywords.slice(0,4).join(", "):""));
  i=obAdd("Lege dein Suchfeld an");
  const cr=await callFn("manage-niches",{action:"create",name:s.name||topic,description:s.description||"",target_audience:OB.aud||s.target_audience||"",keywords:s.keywords||[topic],competitors:s.competitors||[]},false);
  if(!cr||!cr.ok||!cr.j||!cr.j.id){OBLOG[i].label="Konnte Suchfeld nicht anlegen";obDone(i,"Bitte später erneut versuchen");return;}
  const nid=cr.j.id;obDone(i,"„"+(s.name||topic)+"“ angelegt");
  i=obAdd("Speichere dein Profil");
  await callFn("manage-niches",{action:"save",id:nid,knowledge:[topic],reachable:OB.aud,can_build:"Selbsteinschätzung: Fachwissen "+OB.stars.knowledge+"/5, Zugang "+OB.stars.access+"/5, Umsetzung "+OB.stars.build+"/5"},false);
  obDone(i,"Selbsteinschätzung übernommen");
  let items=[];(s.sources&&s.sources.terms||[topic]).slice(0,6).forEach(t=>items.push({platform:"term",handle:t}));
  if(OB.places.has("web")||OB.places.has("communities")||OB.places.has("foren"))(s.sources&&s.sources.websites||[]).slice(0,6).forEach(w=>items.push({platform:"web",handle:w}));
  if(OB.places.has("communities")||OB.places.has("foren"))(s.sources&&s.sources.hackernews||[]).slice(0,4).forEach(q=>items.push({platform:"hackernews",handle:q}));
  if(OB.places.has("reddit"))(s.keywords||[topic]).slice(0,3).forEach(q=>items.push({platform:"reddit",handle:q}));
  (s.sources&&s.sources.rss||[]).slice(0,4).forEach(r=>items.push({platform:"rss",handle:r}));
  if(OB.places.has("apps")){i=obAdd("Suche passende Konkurrenz-Apps");const comps=(s.competitors||[]).slice(0,3),seen={};let names=[];
    for(const c of comps){const ar=await callFn("search-apps",{q:c},false);if(ar&&ar.j&&ar.j.apps)ar.j.apps.slice(0,1).forEach(a=>{if(!seen[a.id]){seen[a.id]=1;items.push({platform:"appstore",handle:a.id+"|"+a.name});names.push(a.name);}});}
    obDone(i,names.length?names.length+" gefunden: "+names.join(", "):"keine gefunden");}
  i=obAdd("Richte die Orte zum Zuhören ein");
  if(items.length)await callFn("manage-sources",{action:"addmany",items:items,niche_id:nid},false);
  obDone(i,items.length+" Orte aktiviert");
  NICHE=nid;localStorage.setItem("cf_niche",nid);
  const scr=[];if(OB.places.has("apps"))scr.push("scrape-appstore");if(OB.places.has("web")||OB.places.has("communities")||OB.places.has("foren"))scr.push("scrape-web");if(OB.places.has("communities")||OB.places.has("foren"))scr.push("scrape-hn");if(OB.places.has("reddit"))scr.push("scrape-reddit");scr.push("scrape-rss");
  for(const fn of scr){const k=obAdd("Höre zu: "+(PLACE_LBL[fn]||fn));let r=null;try{r=await callFn(fn,{niche_id:nid});}catch(_){}
    const ins=(r&&r.j&&r.j.inserted)||0;obDone(k,ins>0?ins+" neue Kundenstimmen":"nichts Neues gefunden");}
  const proc=obAdd("Lese Kundenstimmen und entdecke Chancen");
  let chances=0;
  for(let b=0;b<8;b++){let pr=null;try{pr=await callFn("process-mentions",{niche_id:nid});}catch(_){}
    const processed=(pr&&pr.j&&pr.j.processed)||0;chances=await cnt("dashboard_opportunities",nid);
    obSet(proc,chances+" Chancen entdeckt"+(processed?" · noch am Lesen…":""));if(!processed)break;}
  obDone(proc,chances+" Chancen entdeckt");
  OBRESULT={nid:nid,name:(s.name||topic),chances:chances};
  OBDONE=true;obFeed();
  setTimeout(function(){if(OBDONE&&TAB!=="home"&&TAB!=="chances")enterDashboard(nid,(s.name||topic));},1600);
}
async function reprocess(){if(!NICHE)return;toast("Suche läuft…");
  const scr=["scrape-appstore","scrape-web","scrape-hn","scrape-rss"];
  for(const fn of scr){try{await callFn(fn,{niche_id:NICHE});}catch(_){}}
  for(let i=0;i<6;i++){let pr=null;try{pr=await callFn("process-mentions",{niche_id:NICHE});}catch(_){}if(!(pr&&pr.j&&pr.j.processed))break;}
  await loadChances();renderChances();toast("Fertig");}
/* start */
wireNav();
if(!cfg.SUPABASE_URL){$("view").innerHTML='<div class="empty"><div class="big">⚙️</div><p>config.js fehlt.</p></div>';}else loadNiches();
</script>
</body>
