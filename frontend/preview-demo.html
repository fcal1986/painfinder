<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PainFinder · Opportunities</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0a0d; --panel:#16141b; --panel2:#1e1b25; --panel3:#262230;
    --ink:#f0ecf4; --muted:#928ca0; --faint:#615b70; --line:#2c2836;
    --gold:#e8b54d; --green:#5ce08f; --blue:#67c5ff; --hot:#ff6b5d; --amber:#ffb347;
    --r:14px; --shadow:0 24px 70px -28px rgba(0,0,0,.85);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:"IBM Plex Sans",sans-serif}
  body{background-image:radial-gradient(800px 420px at 90% -8%, rgba(232,181,77,.08), transparent),radial-gradient(700px 500px at -8% 108%, rgba(92,224,143,.05), transparent);background-attachment:fixed}
  header{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(11,10,13,.82);border-bottom:1px solid var(--line)}
  .bar{max-width:1280px;margin:0 auto;padding:16px 22px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .logo{font-family:"Fraunces",serif;font-weight:600;font-size:25px;letter-spacing:-.4px}
  .logo b{color:var(--gold)}
  .logo span{display:block;font-family:"IBM Plex Mono";font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
  .stats{display:flex;gap:20px;margin-left:6px}
  .stat .n{font-family:"Fraunces",serif;font-size:22px;font-weight:600;line-height:1}
  .stat .n.gold{color:var(--gold)} .stat .n.green{color:var(--green)}
  .stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
  .actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
  .btn{font-family:"IBM Plex Mono";font-size:12px;padding:9px 13px;border-radius:10px;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--ink);transition:.15s;white-space:nowrap}
  .btn:hover{border-color:var(--gold);transform:translateY(-1px)}
  .btn.primary{background:var(--gold);color:#1a1206;border-color:var(--gold);font-weight:600}
  .btn:disabled{opacity:.5;cursor:wait;transform:none}
  main{max-width:1280px;margin:0 auto;padding:24px 22px 100px}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(140%);background:var(--panel3);border:1px solid var(--line);padding:12px 18px;border-radius:12px;z-index:200;font-size:13px;box-shadow:var(--shadow);transition:transform .3s;max-width:90vw}
  #toast.on{transform:translateX(-50%) translateY(0)}
  .filters{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin:20px 0 22px}
  .filters input,.filters select{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:9px 12px;border-radius:10px;font-family:inherit;font-size:13px;outline:none}
  .filters input{flex:1;min-width:180px}
  .filters input:focus,.filters select:focus{border-color:var(--gold)}
  .seg{display:flex;gap:5px;flex-wrap:wrap}
  .seg span{padding:7px 12px;border:1px solid var(--line);border-radius:999px;font-size:12px;color:var(--muted);cursor:pointer;background:var(--panel);user-select:none}
  .seg span.on{background:var(--ink);color:var(--bg);border-color:var(--ink);font-weight:600}
  .grid{display:grid;gap:15px;grid-template-columns:repeat(auto-fill,minmax(355px,1fr))}
  .card{position:relative;background:linear-gradient(165deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;cursor:pointer;overflow:hidden;transition:transform .16s,border-color .16s,box-shadow .16s;animation:rise .4s both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:var(--shadow)}
  .stripe{position:absolute;left:0;top:0;width:5px;height:100%}
  .stripe.test_now{background:var(--hot)} .stripe.validate{background:var(--amber)} .stripe.research{background:var(--blue)} .stripe.observe{background:var(--faint)} .stripe.ignore{background:var(--line)}
  .ctop{display:flex;align-items:flex-start;gap:12px}
  .cat{font-family:"IBM Plex Mono";font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--blue)}
  .card h3{font-family:"Fraunces",serif;font-weight:600;font-size:18px;line-height:1.25;margin:7px 0 0}
  .scorebox{margin-left:auto;text-align:center;flex:0 0 auto}
  .scorebox .v{font-family:"Fraunces",serif;font-size:34px;font-weight:600;line-height:1;color:var(--gold)}
  .scorebox .max{font-size:10px;color:var(--faint)}
  .ladder{display:flex;gap:4px;margin-top:14px}
  .rung{flex:1;height:6px;border-radius:3px;background:var(--panel3)}
  .rung.on{background:var(--green)}
  .stagelabel{font-family:"IBM Plex Mono";font-size:10px;color:var(--muted);margin-top:5px;letter-spacing:.5px}
  .meta{display:flex;gap:7px;align-items:center;margin-top:13px;flex-wrap:wrap}
  .tag{font-family:"IBM Plex Mono";font-size:10.5px;padding:4px 8px;border-radius:7px;border:1px solid var(--line);color:var(--muted)}
  .tag.ev{color:var(--green);border-color:rgba(92,224,143,.35)}
  .tag.fit{color:var(--gold);border-color:rgba(232,181,77,.35)}
  .act{margin-left:auto;font-family:"IBM Plex Mono";font-size:10px;font-weight:600;padding:4px 9px;border-radius:7px;text-transform:uppercase;letter-spacing:.6px}
  .act.test_now{background:rgba(255,107,93,.16);color:var(--hot)}
  .act.validate{background:rgba(255,179,71,.16);color:var(--amber)}
  .act.research{background:rgba(103,197,255,.14);color:var(--blue)}
  .act.observe{background:rgba(97,91,112,.18);color:var(--muted)}
  .act.ignore{background:var(--panel3);color:var(--faint)}
  .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:70px 20px;border:1px dashed var(--line);border-radius:var(--r);line-height:1.7}
  .empty b{color:var(--gold)}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:.2s;z-index:90}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(580px,100%);background:var(--panel);border-left:1px solid var(--line);z-index:100;transform:translateX(100%);transition:transform .26s cubic-bezier(.2,.8,.2,1);overflow-y:auto;padding:28px 26px 70px}
  .drawer.on{transform:translateX(0)}
  .drawer .x{position:absolute;top:18px;right:20px;background:none;border:none;color:var(--muted);font-size:26px;cursor:pointer}
  .drawer h2{font-family:"Fraunces",serif;font-weight:600;font-size:24px;line-height:1.2;margin:4px 44px 4px 0}
  .bigscore{display:flex;align-items:baseline;gap:10px;margin-top:10px}
  .bigscore .v{font-family:"Fraunces",serif;font-size:46px;font-weight:600;color:var(--gold);line-height:1}
  .sec{margin-top:22px}
  .sec .h{font-family:"IBM Plex Mono";font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);margin-bottom:7px}
  .sec p{margin:0;font-size:14px;line-height:1.6}
  .block-title{font-family:"IBM Plex Mono";font-size:10px;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:1px}
  .bars{display:grid;gap:7px}
  .brow{display:grid;grid-template-columns:140px 1fr 26px;align-items:center;gap:10px;font-size:12px}
  .brow span:first-child{color:var(--muted)}
  .track{height:6px;background:var(--panel3);border-radius:99px;overflow:hidden}
  .fill{height:100%}
  .fill.ev{background:linear-gradient(90deg,rgba(92,224,143,.5),var(--green))}
  .fill.fit{background:linear-gradient(90deg,rgba(232,181,77,.5),var(--gold))}
  .evidence{border-left:3px solid var(--green);padding:8px 0 8px 13px;margin-bottom:10px}
  .evidence .et{font-family:"IBM Plex Mono";font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:.5px}
  .evidence .q{font-size:13px;font-style:italic;color:var(--ink);margin:3px 0}
  .evidence .amt{font-family:"IBM Plex Mono";font-size:12px;color:var(--gold);font-weight:600}
  .src a{color:var(--blue);font-size:12px;word-break:break-all;display:block;margin-bottom:4px}
  .prios{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
  .pbtn{flex:1;min-width:80px;padding:8px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-family:"IBM Plex Mono";font-size:11px;cursor:pointer}
  .pbtn.on{color:var(--bg);font-weight:600}
  .pbtn.on[data-p=test_now]{background:var(--hot);border-color:var(--hot)}
  .pbtn.on[data-p=validate]{background:var(--amber);border-color:var(--amber)}
  .pbtn.on[data-p=research]{background:var(--blue);border-color:var(--blue)}
  .pbtn.on[data-p=observe]{background:var(--muted);border-color:var(--muted)}
  .pbtn.on[data-p=ignore]{background:var(--faint);border-color:var(--faint)}
  textarea{width:100%;margin-top:9px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-family:inherit;font-size:13px;padding:10px;min-height:64px;resize:vertical}
  .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:150;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);padding:20px}
  .modal.on{display:flex}
  .modal .box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px;max-width:480px;width:100%;box-shadow:var(--shadow)}
  .modal h3{font-family:"Fraunces",serif;font-weight:600;margin:0 0 6px;font-size:20px}
  .modal p{font-size:13px;color:var(--muted);line-height:1.6;margin:0 0 14px}
  .modal code{font-family:"IBM Plex Mono";font-size:11.5px;background:var(--panel3);padding:2px 6px;border-radius:5px;color:var(--gold)}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:26px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px}
  .drop:hover{border-color:var(--gold);color:var(--ink)}
  .modal .row{display:flex;gap:8px;margin-top:16px}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo">Pain<b>Finder</b><span>opportunity engine · mvp</span></div>
    <div class="stats">
      <div class="stat"><div class="n gold" id="stTotal">–</div><div class="l">Opportunities</div></div>
      <div class="stat"><div class="n green" id="stStage4">–</div><div class="l">Stufe 4</div></div>
      <div class="stat"><div class="n" id="stTop">–</div><div class="l">Top-Score</div></div>
    </div>
    <div class="actions">
      <button class="btn" id="bReddit">↺ Reddit</button>
      <button class="btn" id="bHN">↺ Hacker News</button>

      <button class="btn primary" id="bProcess">⚙ Verarbeiten</button>
    </div>

</header>
<main>
  <div class="filters">
    <input id="q" placeholder="suchen: thema, zielgruppe, kategorie…" />

    <select id="fSort">

  <div class="grid" id="grid"><div class="empty">lade…</div></div>
</main>
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer"></aside>
<div id="toast"></div>
<div class="modal" id="csvModal">
  <div class="box">
    <h3>Reviews als CSV importieren</h3>
    <p>Pflichtspalte: <code>body</code>. Optional: <code>title</code>, <code>url</code>, <code>author</code>, <code>source</code>, <code>posted_at</code>. Erste Zeile = Spaltennamen.</p>
    <div class="drop" id="drop">CSV-Datei hierher ziehen oder klicken</div>
    <input type="file" id="csvFile" accept=".csv" style="display:none" />
    <div class="row">
      <button class="btn" id="csvCancel" style="flex:1">Abbrechen</button>
      <button class="btn primary" id="csvGo" style="flex:1" disabled>Importieren &amp; verarbeiten</button>
    </div>
  </div>
</div>

<script>
window.PAINFINDER_CONFIG={SUPABASE_URL:"https://demo.supabase.co",SUPABASE_ANON_KEY:"demo"};
const MOCK=[
 {id:"1",title:"Vertrags-Verlängerungen manuell überwachen",category:"Finance",audience:"Ops-Teams im Mittelstand",opportunity_score:84,stage:4,evidence_count:3,source_count:2,mention_count:6,founder_fit:8,recommended_action:"test_now",b2b_context:true,named_provider:"DocuSign CLM",monetization_idea:"SaaS pro Seat",next_step:"5 Ops-Leads fragen, was sie heute zahlen",spending_evidence:9,incumbent_frustration:7,business_value:8,fit_knowledge:9,fit_access:8,fit_buildability:7,created_at:new Date().toISOString()},
 {id:"2",title:"Bank-Export bricht beim Reconciliation-Tool",category:"Finance",audience:"Finanzabteilungen",opportunity_score:71,stage:4,evidence_count:2,source_count:2,mention_count:4,founder_fit:7,recommended_action:"validate",b2b_context:true,named_provider:"DATEV",monetization_idea:"Usage-based",next_step:"Konkurrenzpreise prüfen",spending_evidence:8,incumbent_frustration:8,business_value:7,fit_knowledge:8,fit_access:7,fit_buildability:6,created_at:new Date().toISOString()},
 {id:"3",title:"Procurement-Mails in strukturierte POs",category:"Productivity",audience:"Einkauf",opportunity_score:58,stage:3,evidence_count:1,source_count:2,mention_count:3,founder_fit:8,recommended_action:"research",b2b_context:true,named_provider:null,monetization_idea:"KI-Agent pro Workflow",next_step:"10 Mails manuell durchspielen",spending_evidence:5,incumbent_frustration:4,business_value:8,fit_knowledge:8,fit_access:8,fit_buildability:8,created_at:new Date().toISOString()},
 {id:"4",title:"App X fehlt Dark Mode",category:"SaaS",audience:"Endnutzer",opportunity_score:18,stage:2,evidence_count:0,source_count:2,mention_count:5,founder_fit:3,recommended_action:"observe",b2b_context:false,named_provider:null,monetization_idea:"-",next_step:"Beobachten",spending_evidence:0,incumbent_frustration:2,business_value:1,fit_knowledge:3,fit_access:2,fit_buildability:5,created_at:new Date().toISOString()}
];
const sb={from:()=>({select:async()=>({data:MOCK,error:null}),eq:function(){return this},limit:function(){return this},maybeSingle:async()=>({data:null}),insert:async()=>({error:null})})};
function supabaseStub(){return sb;}

<script>
const cfg = window.PAINFINDER_CONFIG;
const sb = supabaseStub();
const FN = cfg.SUPABASE_URL + "/functions/v1/";
let ALL=[], parsedCsv=null;
const state={q:"",cat:"",sort:"score",acts:new Set()};
const EV_FIELDS=[["spending_evidence","Zahlungs-Evidenz"],["incumbent_frustration","Anbieter-Frust"],["business_value","Geschaeftswert"]];
const FIT_FIELDS=[["fit_knowledge","Wissensvorteil"],["fit_access","Kundenzugang"],["fit_buildability","Umsetzbarkeit"]];
const ACT_LABEL={test_now:"Sofort testen",validate:"Validieren",research:"Recherchieren",observe:"Beobachten",ignore:"Ignorieren"};
const EV_TYPE_LABEL={spending_disclosed:"Zahlt bereits",paid_alternative_named:"Bezahltes Tool genannt",alternative_hunting:"Sucht Alternative",switching_frustration:"Wechsel-Frust",urgent_need:"Dringender Bedarf",loss_disclosed:"Verlust beziffert",hiring_for_problem:"Stellt dafuer ein"};
async function load(){
  const { data, error } = await sb.from("dashboard_opportunities").select("*");
  if(error){ document.getElementById("grid").innerHTML='<div class="empty">Fehler: '+error.message+'<br><small>config.js korrekt? Schema eingespielt?</small></div>'; return; }
  ALL=data||[]; hydrate(); render();
}
function hydrate(){
  document.getElementById("stTotal").textContent=ALL.length;
  document.getElementById("stStage4").textContent=ALL.filter(o=>o.stage===4).length;
  document.getElementById("stTop").textContent=ALL.length?Math.max(...ALL.map(o=>+o.opportunity_score||0)).toFixed(0):"-";
  const cats=[...new Set(ALL.map(o=>o.category).filter(Boolean))].sort();
  document.getElementById("fCat").innerHTML='<option value="">Alle Kategorien</option>'+cats.map(c=>'<option>'+c+'</option>').join("");
}
function filtered(){
  let r=ALL.filter(o=>{
    if(state.cat && o.category!==state.cat) return false;
    if(state.acts.size && !state.acts.has(o.recommended_action)) return false;
    if(state.q){const b=[o.title,o.audience,o.category,o.monetization_idea].join(" ").toLowerCase();if(!b.includes(state.q.toLowerCase()))return false;}
    return true;
  });
  const s=state.sort;
  r.sort((a,b)=>{
    if(s==="score")return (+b.opportunity_score||0)-(+a.opportunity_score||0);
    if(s==="stage")return b.stage-a.stage||(+b.opportunity_score)-(+a.opportunity_score);
    if(s==="evidence")return b.evidence_count-a.evidence_count;
    if(s==="fit")return b.founder_fit-a.founder_fit;
    if(s==="new")return new Date(b.created_at)-new Date(a.created_at);
  });
  return r;
}
function render(){
  const r=filtered(), g=document.getElementById("grid");
  if(!r.length){ g.innerHTML='<div class="empty">Noch keine Opportunities.<br>Klicke oben <b>&#8634; Reddit</b> oder <b>&#8634; Hacker News</b>, dann <b>&#9881; Verarbeiten</b>.</div>'; return; }
  g.innerHTML=r.map((o,i)=>{
    const rungs=[1,2,3,4].map(n=>'<div class="rung '+(o.stage>=n?'on':'')+'"></div>').join("");
    return '<div class="card" data-id="'+o.id+'" style="animation-delay:'+Math.min(i*30,300)+'ms">'+
      '<div class="stripe '+o.recommended_action+'"></div>'+
      '<div class="ctop"><div><div class="cat">'+esc(o.category||"-")+'</div><h3>'+esc(o.title)+'</h3></div>'+
      '<div class="scorebox"><div class="v">'+(+o.opportunity_score||0).toFixed(0)+'</div><div class="max">/ 100</div></div></div>'+
      '<div class="ladder">'+rungs+'</div>'+
      '<div class="stagelabel">Stufe '+o.stage+'/4 &middot; '+stageName(o.stage)+'</div>'+
      '<div class="meta"><span class="tag ev">&#9921; '+o.evidence_count+' Evidenz</span>'+
      '<span class="tag">&#8862; '+o.source_count+' Quellen &middot; '+o.mention_count+'&times;</span>'+
      '<span class="tag fit">&#9672; Fit '+o.founder_fit+'/10</span>'+
      '<span class="act '+o.recommended_action+'">'+ACT_LABEL[o.recommended_action]+'</span></div></div>';
  }).join("");
  g.querySelectorAll(".card").forEach(c=>c.onclick=()=>openDrawer(c.dataset.id));
}
const stageName=s=>({1:"Beschwerde",2:"Wiederkehrend",3:"Zahlbar",4:"Geschaeftschance"}[s]||"");
async function openDrawer(id){
  const o=ALL.find(x=>x.id===id); if(!o)return;
  const d=document.getElementById("drawer");
  d.innerHTML='<button class="x" onclick="closeDrawer()">&times;</button>'+
    '<div class="cat">'+esc(o.category||"-")+' &middot; Stufe '+o.stage+'/4 '+stageName(o.stage)+'</div>'+
    '<h2>'+esc(o.title)+'</h2>'+
    '<div class="bigscore"><div class="v">'+(+o.opportunity_score||0).toFixed(0)+'</div>'+
    '<span style="color:var(--muted)">/100 &middot; <b style="color:var(--ink)">'+ACT_LABEL[o.recommended_action]+'</b></span></div>'+
    '<div id="dynbody"><div class="sec"><p style="color:var(--muted)">lade Details...</p></div></div>';
  document.getElementById("scrim").classList.add("on"); d.classList.add("on");
  const [{data:ev},{data:jtbd},{data:links}] = await Promise.all([
    sb.from("validation_evidence").select("*").eq("opportunity_id",id),
    sb.from("jobs_to_be_done").select("*").eq("opportunity_id",id).limit(1),
    sb.from("opportunity_mentions").select("raw_mentions(platform,url,title)").eq("opportunity_id",id),
  ]);
  const job=jtbd&&jtbd[0];
  const evBars=EV_FIELDS.map(f=>bar(f[0],f[1],o[f[0]],"ev")).join("");
  const fitBars=FIT_FIELDS.map(f=>bar(f[0],f[1],o[f[0]],"fit")).join("");
  const evHtml=(ev||[]).map(e=>'<div class="evidence"><div class="et">'+(EV_TYPE_LABEL[e.evidence_type]||e.evidence_type)+'</div>'+
      '<div class="q">&bdquo;'+esc(e.quote)+'"</div>'+
      (e.amount_value?'<div class="amt">'+e.amount_value+' '+esc(e.amount_currency||"")+' / '+esc(e.amount_period||"")+'</div>':"")+'</div>').join("")
      || '<p style="color:var(--muted);font-size:13px">Keine Zahlungs-Belege - bleibt unter Stufe 3 (Score gedeckelt).</p>';
  const srcHtml=(links||[]).map(l=>{const m=l.raw_mentions;return m&&m.url?
      '<a href="'+m.url+'" target="_blank" rel="noopener">'+esc(m.platform)+': '+esc((m.title||m.url).slice(0,70))+'</a>':
      '<span style="color:var(--muted);font-size:12px">'+esc((m&&m.platform)||"")+'</span>';}).join("");
  const prios=Object.keys(ACT_LABEL).map(k=>'<button class="pbtn '+(o.recommended_action===k?'on':'')+'" data-p="'+k+'">'+ACT_LABEL[k]+'</button>').join("");
  document.getElementById("dynbody").innerHTML=
    '<div class="sec"><div class="h">Empfohlener naechster Schritt</div><p>'+esc(o.next_step||"-")+'</p></div>'+
    '<div class="sec"><div class="h">Monetarisierung</div><p>'+esc(o.monetization_idea||"-")+'</p></div>'+
    (o.audience?'<div class="sec"><div class="h">Zielgruppe</div><p>'+esc(o.audience)+'</p></div>':"")+
    (job?'<div class="sec"><div class="h">Jobs-to-be-done</div><p><b>Job:</b> '+esc(job.job)+'</p>'+
      (job.workaround?'<p style="margin-top:6px"><b>Workaround:</b> '+esc(job.workaround)+'</p>':"")+
      (job.workaround_pain?'<p style="margin-top:6px;color:var(--muted)"><b>Warum schlecht:</b> '+esc(job.workaround_pain)+'</p>':"")+'</div>':"")+
    '<div class="sec"><div class="h">Zahlungs-Evidenz ('+(ev||[]).length+')</div>'+evHtml+'</div>'+
    '<div class="sec"><div class="h">Score-Aufschluesselung</div>'+
      '<div class="block-title">Evidenz-Block (max 50)</div><div class="bars">'+evBars+'</div>'+
      '<div class="block-title">Founder Fit 2.0 (max 30)</div><div class="bars">'+fitBars+'</div></div>'+
    (srcHtml?'<div class="sec"><div class="h">Quellen ('+(links||[]).length+')</div><div class="src">'+srcHtml+'</div></div>':"")+
    '<div class="sec"><div class="h">Aktion ueberschreiben</div><div class="prios">'+prios+'</div>'+
      '<textarea id="noteTxt" placeholder="Notiz..."></textarea>'+
      '<button class="btn primary" id="saveNote" style="margin-top:9px">Speichern</button></div>';
  d.querySelectorAll(".pbtn").forEach(b=>b.onclick=()=>savePrio(id,b.dataset.p));
  d.querySelector("#saveNote").onclick=()=>{const on=d.querySelector(".pbtn.on");savePrio(id,(on&&on.dataset.p)||o.recommended_action,d.querySelector("#noteTxt").value);};
}
function bar(k,l,v,cls){v=v||0;return '<div class="brow"><span>'+l+'</span><span class="track"><span class="fill '+cls+'" style="width:'+(v*10)+'%"></span></span><b>'+v+'</b></div>';}
function closeDrawer(){document.getElementById("scrim").classList.remove("on");document.getElementById("drawer").classList.remove("on");}
async function savePrio(id,prio,note){
  const { error }=await sb.from("user_notes").insert({opportunity_id:id,priority:prio,note:note||null});
  toast(error?("Fehler: "+error.message):"Gespeichert");
}
function getSecret(){
  let s=sessionStorage.getItem("pf_secret");
  if(!s){ s=prompt("PainFinder-Secret eingeben (nur für diese Sitzung gespeichert):"); if(s) sessionStorage.setItem("pf_secret",s); }
  return s;
}
async function runFn(name,btn,label,extraBody){
  const secret=getSecret(); if(!secret){toast("Abgebrochen — kein Secret.");return false;}
  btn.disabled=true; const t=btn.textContent; btn.textContent="... laeuft";
  let ok=false;
  try{
    const res=await fetch(FN+name,{method:"POST",headers:{
      "Authorization":"Bearer "+cfg.SUPABASE_ANON_KEY,"Content-Type":"application/json","x-painfinder-secret":secret},
      body:extraBody?JSON.stringify(extraBody):undefined});
    if(res.status===401){sessionStorage.removeItem("pf_secret");toast("Secret falsch — bitte erneut.");}
    else{const j=await res.json(); if(j.error) toast(label+" Fehler: "+j.error); else {toast(label+": "+summarize(j));ok=true;} await load();}
  }catch(e){toast(label+" Fehler: "+e.message);}
  btn.disabled=false; btn.textContent=t; return ok;
}
function summarize(j){
  if(j.inserted!==undefined) return j.inserted+" neue Erwaehnungen";
  if(j.newOpportunities!==undefined) return j.processed+" verarbeitet, "+j.newOpportunities+" neue Opps, "+j.updated+" aktualisiert";
  return "ok";
}
document.getElementById("bReddit").onclick=e=>runFn("scrape-reddit",e.currentTarget,"Reddit");
document.getElementById("bHN").onclick=e=>runFn("scrape-hn",e.currentTarget,"Hacker News");
document.getElementById("bProcess").onclick=e=>runFn("process-mentions",e.currentTarget,"Verarbeitung");
const modal=document.getElementById("csvModal");
document.getElementById("bCSV").onclick=()=>modal.classList.add("on");
document.getElementById("csvCancel").onclick=()=>{modal.classList.remove("on");parsedCsv=null;};
document.getElementById("drop").onclick=()=>document.getElementById("csvFile").click();
document.getElementById("csvFile").onchange=e=>handleCsv(e.target.files[0]);
document.getElementById("drop").ondragover=e=>{e.preventDefault();};
document.getElementById("drop").ondrop=e=>{e.preventDefault();handleCsv(e.dataTransfer.files[0]);};
function handleCsv(file){
  if(!file)return;
  Papa.parse(file,{header:true,skipEmptyLines:true,complete:function(res){
    const rows=res.data.filter(r=>(r.body||r.text||r.review||"").trim().length>=10);
    if(!rows.length){toast("Keine gueltigen Zeilen (Spalte 'body' fehlt?)");return;}
    parsedCsv={rows:rows,source_label:file.name};
    document.getElementById("drop").textContent="OK "+file.name+" - "+rows.length+" Zeilen bereit";
    document.getElementById("csvGo").disabled=false;
  }});
}
document.getElementById("csvGo").onclick=async function(e){
  if(!parsedCsv)return;
  const btn=e.currentTarget; btn.disabled=true; btn.textContent="... importiere";
  try{
    const secret=getSecret(); if(!secret){toast("Abgebrochen — kein Secret.");btn.disabled=false;btn.textContent="Importieren & verarbeiten";return;}
    const r1=await fetch(FN+"import-mentions",{method:"POST",headers:{"Authorization":"Bearer "+cfg.SUPABASE_ANON_KEY,"Content-Type":"application/json","x-painfinder-secret":secret},body:JSON.stringify(parsedCsv)});
    const j1=await r1.json();
    if(j1.error){toast("Import-Fehler: "+j1.error);btn.disabled=false;btn.textContent="Importieren & verarbeiten";return;}
    toast(j1.inserted+" importiert - verarbeite...");
    await runFn("process-mentions",document.getElementById("bProcess"),"Verarbeitung");
    modal.classList.remove("on"); parsedCsv=null;
    document.getElementById("drop").textContent="CSV-Datei hierher ziehen oder klicken";
  }catch(err){toast("Fehler: "+err.message);}
  btn.disabled=false; btn.textContent="Importieren & verarbeiten";
};
document.getElementById("q").oninput=e=>{state.q=e.target.value;render();};
document.getElementById("fCat").onchange=e=>{state.cat=e.target.value;render();};
document.getElementById("fSort").onchange=e=>{state.sort=e.target.value;render();};
document.querySelectorAll("#actSeg span").forEach(s=>s.onclick=()=>{s.classList.toggle("on");const a=s.dataset.a;state.acts.has(a)?state.acts.delete(a):state.acts.add(a);render();});
document.getElementById("scrim").onclick=closeDrawer;
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeDrawer();modal.classList.remove("on");}});
let toastT;function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("on"),4200);}
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
load();
</script>
</body>
