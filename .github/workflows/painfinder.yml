# .github/workflows/painfinder.yml
# Serverseitiger Cron. Secret als GitHub-Actions-Secret (PAINFINDER_SECRET).
# VOR dem Commit: DEIN_REF durch deinen Supabase-Project-Ref ersetzen.

name: painfinder-pipeline

on:
  #schedule:
  #  - cron: '0 * * * *'        # stündlich (UTC)
  workflow_dispatch: {}

concurrency:
  group: painfinder-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Quellen sammeln + verarbeiten
        env:
          SECRET: ${{ secrets.PAINFINDER_SECRET }}
          BASE: https://rqupvcrmugfrmutcirlu.supabase.co/functions/v1
        run: |
          set -e
          for FN in scrape-hn scrape-appstore scrape-rss scrape-web scrape-reddit; do
            echo "→ $FN"
            curl -sS -X POST "$BASE/$FN" -H "x-painfinder-secret: $SECRET" || echo "  ($FN übersprungen)"
            echo
          done
          echo "→ Verarbeiten (5 Batches)"
          for i in 1 2 3 4 5; do
            curl -fsS -X POST "$BASE/process-mentions" -H "x-painfinder-secret: $SECRET"
            echo
          done
